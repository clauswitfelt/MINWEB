<html>
<script>

$(document).ready(function() {

    promise = $.ajax({
        type:"GET",
        dataType:"text",
        url:"musik.csv",
        cache:false
    });

    promise.done(function(data){

        //Parse CSV File
        //split on new line
        var dataArr = data.split("\n");

        //for each line in array
        $.each(dataArr,function(){
            if (this != "") {

                //split files and create row
                var row = new String("");
                valArr = this.split(",");
                    row += "<tr>"

                $.each(valArr, function(){
                    row += "<td>" + this +"</td>"
                });     

                    row += "</tr>"

                    //Add row to table
                    $('tbody').append(row);

            }

        });

    });

    // Run script if request fails
    promise.fail(function() {
       console.log('A failure ocurred');
    });

});
  
</script>
  
<h1>Demo</h1>

<table class="table table-hover">
    <thead>
        <tr>
            <th>id</th>
            <th>kunstner</th>
            <th>album</th>
            <th>link</th>
        </tr>
    </thead>
    <tbody>

    </tbody>
</table>


</html>
